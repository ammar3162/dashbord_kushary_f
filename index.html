<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام كشري وأكثر - لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --sidebar-width: 260px;
            --header-height: 60px;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, var(--primary) 0%, #1a252f 100%);
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(calc(var(--sidebar-width) * 0.8));
        }

        .sidebar-header {
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
        }

        .logo i {
            font-size: 28px;
            color: var(--warning);
        }

        .logo h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .toggle-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .menu-item {
            position: relative;
            margin: 5px 10px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .menu-link::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--warning));
            transition: width 0.3s ease;
            z-index: -1;
        }

        .menu-link:hover::before,
        .menu-link.active::before {
            width: 100%;
        }

        .menu-link:hover,
        .menu-link.active {
            color: white;
            transform: translateX(-5px);
        }

        .menu-link i {
            font-size: 18px;
            width: 25px;
            text-align: center;
        }

        .menu-link span {
            font-weight: 500;
            font-size: 14px;
        }

        .menu-badge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: auto;
        }

        /* Main Content */
        .main-content {
            margin-right: var(--sidebar-width);
            min-height: 100vh;
            transition: margin-right 0.3s ease;
            padding: 20px;
        }

        .main-content.expanded {
            margin-right: 60px;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.5s ease;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 10px 15px 10px 40px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            width: 300px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .notification-btn,
        .profile-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--dark);
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            transition: all 0.3s;
            position: relative;
        }

        .notification-btn:hover,
        .profile-btn:hover {
            background: var(--light);
            transform: translateY(-2px);
        }

        .notification-dot {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 10px;
            background: var(--light);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .profile-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .profile-img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary), var(--warning));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .profile-name {
            font-weight: 500;
            color: var(--dark);
        }

        /* Page Container */
        .page-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
            min-height: calc(100vh - 140px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--light);
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title i {
            color: var(--secondary);
        }

        .page-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary), #5dade2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #52be80);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #f5b041);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #ec7063);
            color: white;
        }

        /* Loading Spinner */
        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Mobile Responsive */
        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .mobile-overlay.active {
            display: block;
            opacity: 1;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
            }
            
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-right: 0;
            }
            
            .search-box input {
                width: 200px;
            }
            
            .header-left {
                gap: 10px;
            }
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(231, 76, 60, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
            }
        }

        /* Page Content */
        .page-content {
            animation: fadeIn 0.5s ease;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #666;
        }

        .empty-state p {
            color: #999;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="البحث عن موظف، تقرير..." id="searchInput">

            <div class="header-right">
                <button class="notification-btn" onclick="showNotifications()">

        <!-- Page Container -->
        <div class="page-container">

    </main>

    <!-- Loading Spinner -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <script>
        // Router System
        class Router {
            constructor() {
                this.currentPage = 'dashboard';
                this.pages = {};
                this.init();
            }

            init() {
                // Register page navigation
                document.querySelectorAll('.menu-link').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const page = link.dataset.page;
                        this.navigate(page);
                    });
                });

                // Load initial page
                this.navigate('dashboard');
            }

            navigate(page) {
                if (this.currentPage === page) return;

                // Update active menu
                document.querySelectorAll('.menu-link').forEach(link => {
                    link.classList.remove('active');
                });
                document.querySelector(`[data-page="${page}"]`).classList.add('active');

                // Show loading
                this.showLoading();

                // Load page content
                setTimeout(() => {
                    this.loadPage(page);
                    this.currentPage = page;
                    this.hideLoading();
                }, 300);
            }

            loadPage(page) {
                const pageContent = document.getElementById('pageContent');
                
                switch(page) {
                    case 'dashboard':
                        pageContent.innerHTML = this.getDashboardPage();
                        this.initDashboard();
                        break;
                    case 'employees':
                        pageContent.innerHTML = this.getEmployeesPage();
                        this.initEmployees();
                        break;
                    case 'financial':
                        pageContent.innerHTML = this.getFinancialPage();
                        this.initFinancial();
                        break;
                    case 'closing':
                        pageContent.innerHTML = this.getClosingPage();
                        this.initClosing();
                        break;
                    case 'leaves':
                        pageContent.innerHTML = this.getLeavesPage();
                        this.initLeaves();
                        break;
                    case 'requests':
                        pageContent.innerHTML = this.getRequestsPage();
                        this.initRequests();
                        break;
                    case 'reports':
                        pageContent.innerHTML = this.getReportsPage();
                        this.initReports();
                        break;
                    case 'whatsapp':
                        pageContent.innerHTML = this.getWhatsAppPage();
                        this.initWhatsApp();
                        break;
                    case 'settings':
                        pageContent.innerHTML = this.getSettingsPage();
                        this.initSettings();
                        break;
                    default:
                        pageContent.innerHTML = this.getNotFoundPage();
                }
            }

            showLoading() {
                document.getElementById('loading').classList.add('active');
            }

            hideLoading() {
                document.getElementById('loading').classList.remove('active');
            }

            // Page Templates
            getDashboardPage() {
                return `
                    <div class="page-header">
                        <h1 class="page-title">
                            <i class="fas fa-home"></i>
                            لوحة التحكم
                        </h1>
                        <div class="page-actions">
                            <button class="btn btn-primary" onclick="refreshDashboard()">
                                <i class="fas fa-sync-alt"></i>
                                تحديث
                            </button>
                        </div>
                    </div>
                    
                    <div class="page-content">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                                    <i class="fas fa-users"></i>
                                </div>
                                <div class="stat-content">
                                    <h3>145</h3>
                                    <p>إجمالي الموظفين</p>
                                    <span class="stat-change positive">+12% هذا الشهر</span>
                                </div>
                            </div>
                            
                            <div class="stat-card">
                                <div class="stat-icon" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
                                    <i class="fas fa-money-bill-wave"></i>
                                </div>
                                <div class="stat-content">
                                    <h3>48,750 ريال</h3>
                                    <p>إجمالي الرواتب</p>
                                    <span class="stat-change negative">-5% من الشهر الماضي</span>
                                </div>
                            </div>
                            
                            <div class="stat-card">
                                <div class="stat-icon" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
                                    <i class="fas fa-calendar-check"></i>
                                </div>
                                <div class="stat-content">
                                    <h3>23</h3>
                                    <p>إجازات نشطة</p>
                                    <span class="stat-change neutral">لا يوجد تغيير</span>
                                </div>
                            </div>
                            
                            <div class="stat-card">
                                <div class="stat-icon" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
                                    <i class="fas fa-cash-register"></i>
                                </div>
                                <div class="stat-content">
                                    <h3>125,430 ريال</h3>
                                    <p>إجمالي المبيعات</p>
                                    <span class="stat-change positive">+18% هذا الأسبوع</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="dashboard-charts">
                            <div class="chart-container">
                                <h3>حضور الموظفين هذا الأسبوع</h3>
                                <canvas id="attendanceChart"></canvas>
                            </div>
                            
                            <div class="chart-container">
                                <h3>توزيع الموظفين حسب الفروع</h3>
                                <canvas id="branchChart"></canvas>
                            </div>
                        </div>
                        
                        <div class="recent-activities">
                            <h3>الأنشطة الحديثة</h3>
                            <div class="activity-list">
                                <div class="activity-item">
                                    <div class="activity-icon" style="background: #e3f2fd;">
                                        <i class="fas fa-user-plus" style="color: #2196f3;"></i>
                                    </div>
                                    <div class="activity-content">
                                        <strong>موظف جديد</strong>
                                        <p>تم إضافة أحمد محمد إلى فرع الرياض</p>
                                        <span class="activity-time">منذ 5 دقائق</span>
                                    </div>
                                </div>
                                
                                <div class="activity-item">
                                    <div class="activity-icon" style="background: #f3e5f5;">
                                        <i class="fas fa-calendar-alt" style="color: #9c27b0;"></i>
                                    </div>
                                    <div class="activity-content">
                                        <strong>طلب إجازة</strong>
                                        <p>فاطمة علي تطلب إجازة مرضية لمدة 3 أيام</p>
                                        <span class="activity-time">منذ 15 دقيقة</span>
                                    </div>
                                </div>
                                
                                <div class="activity-item">
                                    <div class="activity-icon" style="background: #e8f5e9;">
                                        <i class="fas fa-money-bill" style="color: #4caf50;"></i>
                                    </div>
                                    <div class="activity-content">
                                        <strong>سلفة جديدة</strong>
                                        <p>محمد سالم أخذ سلفة قدرها 500 ريال</p>
                                        <span class="activity-time">منذ ساعة</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            getEmployeesPage() {
                return `
                    <div class="page-header">
                        <h1 class="page-title">
                            <i class="fas fa-users"></i>
                            إدارة الموظفين
                        </h1>
                        <div class="page-actions">
                            <button class="btn btn-success" onclick="addEmployee()">
                                <i class="fas fa-plus"></i>
                                إضافة موظف
                            </button>
                            <button class="btn btn-primary" onclick="exportEmployees()">
                                <i class="fas fa-download"></i>
                                تصدير
                            </button>
                        </div>
                    </div>
                    
                    <div class="page-content">
                        <div class="filters-section">
                            <div class="filter-group">
                                <label>الفرع:</label>
                                <select id="branchFilter" onchange="filterEmployees()">
                                    <option value="">جميع الفروع</option>
                                    <option value="الرياض">الرياض</option>
                                    <option value="جدة">جدة</option>
                                    <option value="الدمام">الدمام</option>
                                </select>
                            </div>
                            
                            <div class="filter-group">
                                <label>الحالة:</label>
                                <select id="statusFilter" onchange="filterEmployees()">
                                    <option value="">جميع الحالات</option>
                                    <option value="نشط">نشط</option>
                                    <option value="إجازة">إجازة</option>
                                    <option value="مغادرة">مغادرة</option>
                                </select>
                            </div>
                            
                            <div class="filter-group">
                                <label>البحث:</label>
                                <input type="text" id="employeeSearch" placeholder="البحث بالاسم أو الرقم..." onkeyup="filterEmployees()">
                            </div>
                        </div>
                        
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>رقم الموظف</th>
                                        <th>الاسم</th>
