<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المطاعم - متصل بـ Google Sheets</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --sidebar-width: 280px;
            --sidebar-collapsed-width: 80px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            direction: rtl;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 24px;
            font-weight: 700;
        }

        .logo i {
            font-size: 32px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .toggle-btn {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .toggle-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-menu {
            padding: 20px 0;
        }

        .nav-item {
            position: relative;
            margin: 5px 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            color: var(--dark);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transition: width 0.3s;
            z-index: -1;
        }

        .nav-link:hover::before,
        .nav-link.active::before {
            width: 100%;
        }

        .nav-link:hover,
        .nav-link.active {
            color: white;
            transform: translateX(-5px);
        }

        .nav-link i {
            font-size: 20px;
            width: 30px;
            text-align: center;
        }

        .nav-text {
            transition: opacity 0.3s;
        }

        .sidebar.collapsed .nav-text {
            opacity: 0;
            visibility: hidden;
        }

        .nav-badge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: auto;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-right: var(--sidebar-width);
            transition: margin-right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
        }

        .main-content.expanded {
            margin-right: var(--sidebar-collapsed-width);
        }

        /* Top Bar */
        .top-bar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: var(--light);
            border-radius: 12px;
            padding: 10px 20px;
            width: 400px;
            transition: all 0.3s;
        }

        .search-bar:focus-within {
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
            transform: translateY(-2px);
        }

        .search-bar input {
            border: none;
            background: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            margin-right: 10px;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            border: none;
            background: var(--light);
            color: var(--dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .icon-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .notification-dot {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 10px;
            height: 10px;
            background: var(--danger);
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 15px;
            background: var(--light);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-profile:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        /* Page Content */
        .page-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            min-height: calc(100vh - 200px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--light);
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .page-title i {
            color: var(--secondary);
        }

        .page-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #229954);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        /* Google Sheets Integration */
        .sheets-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .sheets-status.connected {
            background: rgba(39, 174, 96, 0.1);
            border: 1px solid var(--success);
        }

        .sheets-status.disconnected {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid var(--danger);
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: var(--success);
        }

        .status-indicator.disconnected {
            background: var(--danger);
        }

        .sheets-config {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .config-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .config-item:hover {
            border-color: var(--secondary);
            transform: translateY(-2px);
        }

        .config-item h4 {
            color: var(--dark);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-item input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
        }

        .config-item .input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .config-item .input-group input {
            flex: 1;
        }

        .config-item .input-group button {
            padding: 10px 20px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .config-item .input-group button:hover {
            background: var(--primary);
        }

        /* Data Tables */
        .data-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .data-table thead {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .data-table th {
            padding: 15px;
            text-align: right;
            font-weight: 600;
        }

        .data-table td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-table tbody tr:hover {
            background: #f8f9fa;
        }

        .table-actions {
            display: flex;
            gap: 5px;
        }

        .table-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .table-btn.edit {
            background: #3498db;
            color: white;
        }

        .table-btn.delete {
            background: #e74c3c;
            color: white;
        }

        .table-btn.refresh {
            background: #f39c12;
            color: white;
        }

        .table-btn:hover {
            transform: scale(1.1);
        }

        /* Loading Spinner */
        .loading-spinner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
        }

        .loading-spinner.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
        }

        .toast {
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            min-width: 300px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-right: 4px solid var(--success);
        }

        .toast.error {
            border-right: 4px solid var(--danger);
        }

        .toast.warning {
            border-right: 4px solid var(--warning);
        }

        .toast.info {
            border-right: 4px solid var(--secondary);
        }

        .toast i {
            font-size: 20px;
        }

        .toast.success i {
            color: var(--success);
        }

        .toast.error i {
            color: var(--danger);
        }

        .toast.warning i {
            color: var(--warning);
        }

        .toast.info i {
            color: var(--secondary);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-title {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .stat-change {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .stat-change.positive {
            background: rgba(39, 174, 96, 0.1);
            color: var(--success);
        }

        .stat-change.negative {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .main-content {
                margin-right: 0;
            }

            .search-bar {
                width: 100%;
            }

            .top-bar {
                flex-direction: column;
                gap: 15px;
            }

            .page-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .config-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Print Styles */
        @media print {
            .sidebar,
            .top-bar,
            .page-actions,
            .table-actions {
                display: none !important;
            }

            .main-content {
                margin-right: 0 !important;
            }

            .page-content {
                box-shadow: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <script>
        // Google Sheets Configuration
        const SHEETS_CONFIG = {
            API_KEY: 'AIzaSyYOUR_API_KEY_HERE', // استبدل بمفتاح API الخاص بك
            CLIENT_ID: 'YOUR_CLIENT_ID.apps.googleusercontent.com', // استبدل بـ Client ID
            SCOPES: 'https://www.googleapis.com/auth/spreadsheets',
            DISCOVERY_DOCS: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            
            // Sheet IDs - استبدل بمعرفات الشيتات الفعلية
            SHEETS: {
                EMPLOYEES: '1ABC123XYZ456', // معرف شيت الموظفين
                SALARIES: '1DEF789UVW012', // معرف شيت الرواتب
                LEAVES: '1GHI345RST678', // معرف شيت الإجازات
                ATTENDANCE: '1JKL901MNO234', // معرف شيت الحضور
                WITHDRAWALS: '1PQR567STU890', // معرف شيت السلف
                PENALTIES: '1VWX123YZA456', // معرف شيت الجزاءات
                CLOSING: '1BCD789EFG012', // معرف شيت إغلاق الصندوق
                REQUESTS: '1HIJ345KLM678' // معرف شيت الطلبات
            }
        };

        // Cache System
        class DataCache {
            constructor() {
                this.cache = new Map();
                this.cacheTimeout = 5 * 60 * 1000; // 5 دقائق
            }

            set(key, data) {
                this.cache.set(key, {
                    data: data,
                    timestamp: Date.now()
                });
            }

            get(key) {
                const item = this.cache.get(key);
                if (!item) return null;
                
                if (Date.now() - item.timestamp > this.cacheTimeout) {
                    this.cache.delete(key);
                    return null;
                }
                
                return item.data;
            }

            clear() {
                this.cache.clear();
            }
        }

        // Google Sheets API Manager
        class GoogleSheetsAPI {
            constructor() {
                this.isAuthorized = false;
                this.tokenClient = null;
            }

            async initialize() {
                try {
                    await this.loadGAPI();
                    await this.loadGIS();
                    await this.initializeTokenClient();
                    return true;
                } catch (error) {
                    console.error('Failed to initialize Google Sheets API:', error);
                    return false;
                }
            }

            loadGAPI() {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://apis.google.com/js/api.js';
                    script.onload = () => {
                        gapi.load('client', resolve);
                    };
                    script.onerror = reject;
                    document.body.appendChild(script);
                });
            }

            loadGIS() {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://accounts.google.com/gsi/client';
                    script.onload = resolve;
                    script.onerror = reject;
                    document.body.appendChild(script);
                });
            }

            async initializeTokenClient() {
                this.tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: SHEETS_CONFIG.CLIENT_ID,
                    scope: SHEETS_CONFIG.SCOPES,
                    callback: (tokenResponse) => {
                        if (tokenResponse && tokenResponse.access_token) {
                            this.isAuthorized = true;
                            gapi.client.setToken(tokenResponse);
                            showToast('تم الاتصال بـ Google Sheets بنجاح', 'success');
                            updateSheetsStatus(true);
                        }
                    }
                });
            }

            authorize() {
                if (this.tokenClient) {
                    this.tokenClient.requestAccessToken();
                }
            }

            async readData(sheetId, range) {
                if (!this.isAuthorized) {
                    throw new Error('Google Sheets not authorized');
                }

                const cacheKey = `${sheetId}_${range}`;
                const cachedData = dataCache.get(cacheKey);
                if (cachedData) {
                    return cachedData;
                }

                try {
                    const response = await gapi.client.sheets.spreadsheets.values.get({
                        spreadsheetId: sheetId,
                        range: range
                    });

                    const data = response.result.values || [];
                    dataCache.set(cacheKey, data);
                    return data;
                } catch (error) {
                    console.error('Error reading data from Google Sheets:', error);
                    throw error;
                }
            }

            async writeData(sheetId, range, values) {
                if (!this.isAuthorized) {
                    throw new Error('Google Sheets not authorized');
                }

                try {
                    const response = await gapi.client.sheets.spreadsheets.values.update({
                        spreadsheetId: sheetId,
                        range: range,
                        valueInputOption: 'USER_ENTERED',
                        resource: {
                            values: values
                        }
                    });

                    // Clear cache for this sheet
                    dataCache.clear();
                    return response;
                } catch (error) {
                    console.error('Error writing data to Google Sheets:', error);
                    throw error;
                }
            }

            async appendData(sheetId, range, values) {
                if (!this.isAuthorized) {
                    throw new Error('Google Sheets not authorized');
                }

                try {
                    const response = await gapi.client.sheets.spreadsheets.values.append({
                        spreadsheetId: sheetId,
                        range: range,
                        valueInputOption: 'USER_ENTERED',
                        resource: {
                            values: values
                        }
                    });

                    // Clear cache for this sheet
                    dataCache.clear();
                    return response;
                } catch (error) {
                    console.error('Error appending data to Google Sheets:', error);
                    throw error;
                }
            }
        }

            async loadLeavesData() {
                try {
                    const leaves = await dataManager.loadLeaves();
                    
                    // Update stats
                    const currentLeaves = leaves.filter(leave => leave.status === 'موافق').length;
                    const pendingLeaves = leaves.filter(leave => leave.status === 'معلق').length;
                    const currentMonth = new Date().getMonth();
                    const monthLeaves = leaves.filter(leave => {
                        const leaveDate = new Date(leave.startDate);
                        return leaveDate.getMonth() === currentMonth;
                    }).length;

                    const currentLeavesEl = document.getElementById('currentLeaves');
                    const pendingLeavesEl = document.getElementById('pendingLeaves');
                    const monthLeavesEl = document.getElementById('monthLeaves');
                    
                    if (currentLeavesEl) currentLeavesEl.textContent = currentLeaves;
                    if (pendingLeavesEl) pendingLeavesEl.textContent = pendingLeaves;
                    if (monthLeavesEl) monthLeavesEl.textContent = monthLeaves;

                    // Load table
                    const tbody = document.getElementById('leavesTableBody');
                    if (!tbody) return;

                    if (leaves.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 20px;">
                                    لا توجد إجازات حالياً
                                </td>
                            </tr>
                        `;
                        return;
                    }

                    tbody.innerHTML = leaves.map(leave => {
                        const startDate = new Date(leave.startDate);
                        const endDate = new Date(leave.endDate);
                        const duration = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
                        
                        return `
                            <tr>
                                <td>${leave.employeeName || '---'}</td>
                                <td>${leave.type || '---'}</td>
                                <td>${this.formatDate(leave.startDate)}</td>
                                <td>${this.formatDate(leave.endDate)}</td>
                                <td>${duration} أيام</td>
                                <td>
                                    <span class="status-badge ${leave.status === 'موافق' ? 'approved' : leave.status === 'مرفوض' ? 'rejected' : 'pending'}">
                                        ${leave.status || 'معلق'}
                                    </span>
                                </td>
                                <td>
                                    <div class="table-actions">
                                        <button class="table-btn edit" onclick="editLeave('${leave.id}')">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="table-btn delete" onclick="deleteLeave('${leave.id}')">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('');

                    // Update calendar
                    const calendarEl = document.getElementById('leaveCalendar');
                    if (calendarEl) {
                        calendarEl.innerHTML = `
                            <div style="text-align: center; padding: 40px;">
                                <i class="fas fa-calendar-alt" style="font-size: 48px; color: #ddd;"></i>
                                <p style="margin-top: 15px; color: #666;">
                                    تقويم الإجازات<br>
                                    <small>سيتم عرض الإجازات هنا</small>
                                </p>
                            </div>
                        `;
                    }
                } catch (error) {
                    console.error('Error loading leaves:', error);
                }
            }

                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',

            };
            
            toast.innerHTML = `

            await sheetsAPI.initialize();
            
            // Load initial page
            await router.navigate('dashboard');
            
            // Setup search
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                console.log('Search:', searchTerm);
            });
            
            // Check for stored sheet configurations
            const configs = ['EMPLOYEES', 'SALARIES', 'LEAVES', 'WITHDRAWALS', 'CLOSING', 'REQUESTS'];
            configs.forEach(config => {
                const storedSheetId = localStorage.getItem(`sheet_${config}`);
                if (storedSheetId) {
                    SHEETS_CONFIG.SHEETS[config] = storedSheetId;
                }
            });
        });

        // Add slideOut animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideOut {
                to {
                    transform: translateX(120%);
                    opacity: 0;
                }
            }
            
            .switch {
                position: relative;
                display: inline-block;
                width: 50px;
                height: 24px;
            }
            
            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }
            
            .slider {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #ccc;
                transition: .4s;
                border-radius: 24px;
            }
            
            .slider:before {
                position: absolute;
                content: "";
                height: 18px;
                width: 18px;
                left: 3px;
                bottom: 3px;
                background-color: white;
                transition: .4s;
                border-radius: 50%;
            }
            
            input:checked + .slider {
                background-color: var(--secondary);
            }
            
            input:checked + .slider:before {
                transform: translateX(26px);
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
