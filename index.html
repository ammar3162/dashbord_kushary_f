<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدخال المصروفات - LANO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a73e8;
            --success-color: #34a853;
            --danger-color: #ea4335;
            --warning-color: #fbbc04;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #202124;
            --border-color: #dadce0;
            --shadow: 0 2px 10px rgba(0,0,0,0.08);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="text"], input[type="number"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .image-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            background-color: #f1f3f4;
        }
        .image-upload-area:hover {
            border-color: var(--primary-color);
            background-color: #e8f0fe;
        }
        .image-upload-area input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        #imagePreviewContainer {
            position: relative;
            margin-top: 20px;
            text-align: center;
            display: none; /* مخفي افتراضياً */
        }
        #imagePreview {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        #highlightBox {
            position: absolute;
            border: 3px solid #00ff00; /* المستطيل الأخضر */
            background-color: rgba(0, 255, 0, 0.1);
            pointer-events: none; /* لئلا يمنع الضغط على الصورة */
            display: none; /* مخفي حتى يتم العثور على الرقم */
            border-radius: 4px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); }
        }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
            text-align: center;
        }
        .btn:hover {
            background-color: #155ab6;
        }
        .btn:disabled {
            background-color: #9e9e9e;
            cursor: not-allowed;
        }
        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        .status-message.success {
            background-color: #e6f4ea;
            color: var(--success-color);
            border: 1px solid #c8e6c9;
        }
        .status-message.error {
            background-color: #fce8e6;
            color: var(--danger-color);
            border: 1px solid #f9c5c5;
        }
        .status-message.info {
            background-color: #e8f0fe;
            color: var(--primary-color);
            border: 1px solid #c2e7ff;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>تسجيل مصروف جديد</h1>

        <!-- منطقة رفع الصورة -->
        <div class="form-group">
            <label>صورة الفاتورة (لقراءة البيانات تلقائياً)</label>
            <div class="image-upload-area" id="uploadArea">
                <input type="file" id="imageInput" accept="image/*">
                <span>📷 اضغط هنا أو اسحب الصورة</span>
            </div>
        </div>

        <!-- معاينة الصورة والمستطيل الأخضر -->
        <div id="imagePreviewContainer">
            <img id="imagePreview" src="" alt="معاينة الفاتورة">
            <div id="highlightBox"></div>
        </div>

        <!-- نموذج إدخال البيانات -->
        <form id="expenseForm">
            <div class="form-group">
                <label for="date">التاريخ</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label for="supplier">المورد</label>
                <input type="text" id="supplier" placeholder="مثال: بنده، جرير..." required>
            </div>
            <div class="form-group">
                <label for="amount">المبلغ (ريال)</label>
                <input type="number" id="amount" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label for="payment">طريقة الدفع</label>
                <select id="payment" required>
                    <option value="كاش">كاش</option>
                    <option value="شبكة">شبكة</option>
                    <option value="تحويل">تحويل بنكي</option>
                </select>
            </div>
            <div class="form-group">
                <label for="taxNumber">الرقم الضريبي</label>
                <input type="text" id="taxNumber" placeholder="سيتم ملؤه تلقائياً">
            </div>
            <div class="form-group">
                <label for="hasVat">فاتورة ضريبية؟</label>
                <select id="hasVat">
                    <option value="نعم">نعم</option>
                    <option value="لا">لا</option>
                </select>
            </div>
            <div class="form-group">
                <label for="notes">ملاحظات</label>
                <textarea id="notes" rows="3" placeholder="أي ملاحظات إضافية..."></textarea>
            </div>

            <button type="submit" class="btn" id="submitBtn">حفظ البيانات</button>
        </form>

        <div class="loader" id="loader"></div>
        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        // !! مهم: ضع رابط تطبيق الويب من Google Apps Script هنا
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw1234567890abcdef1234567890abcdef/exec';

        document.addEventListener('DOMContentLoaded', () => {
            // تعيين تاريخ اليوم كافتراضي
            document.getElementById('date').valueAsDate = new Date();

            // مستمعو الأحداث
            document.getElementById('imageInput').addEventListener('change', handleImageUpload);
            document.getElementById('expenseForm').addEventListener('submit', handleFormSubmit);
        });

        // معالجة رفع الصورة
        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const imagePreview = document.getElementById('imagePreview');
                const previewContainer = document.getElementById('imagePreviewContainer');
                
                imagePreview.src = e.target.result;
                previewContainer.style.display = 'block';

                // تحويل الصورة إلى Base64
                const base64Image = e.target.result;
                
                showLoader(true);
                showStatus('جاري تحليل الصورة...', 'info');

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'processImage', imageBase64: base64Image })
                    });

                    const result = await response.json();

                    if (result.success) {
                        showStatus('تم تحليل الصورة بنجاح!', 'success');
                        populateForm(result.extractedData);
                        drawHighlightBox(result.boundingBox, imagePreview);
                    } else {
                        throw new Error(result.error || 'فشل تحليل الصورة.');
                    }
                } catch (error) {
                    showStatus('خطأ: ' + error.message, 'error');
                } finally {
                    showLoader(false);
                }
            };
            reader.readAsDataURL(file);
        }

        // رسم المستطيل الأخضر
        function drawHighlightBox(box, imageElement) {
            const highlightBox = document.getElementById('highlightBox');
            if (!box) {
                highlightBox.style.display = 'none';
                return;
            }

            // حساب الأبعاد النسبية بناءً على حجم الصورة المعروضة
            const rect = imageElement.getBoundingClientRect();
            const scaleX = rect.width / imageElement.naturalWidth;
            const scaleY = rect.height / imageElement.naturalHeight;

            highlightBox.style.left = (box.x * scaleX) + 'px';
            highlightBox.style.top = (box.y * scaleY) + 'px';
            highlightBox.style.width = (box.width * scaleX) + 'px';
            highlightBox.style.height = (box.height * scaleY) + 'px';
            highlightBox.style.display = 'block';
        }

        // ملء الحقول تلقائياً
        function populateForm(data) {
            if (data.supplier) document.getElementById('supplier').value = data.supplier;
            if (data.amount) document.getElementById('amount').value = data.amount;
            if (data.payment) document.getElementById('payment').value = data.payment;
            if (data.taxNumber) document.getElementById('taxNumber').value = data.taxNumber;
        }

        // معالجة إرسال النموذج
        async function handleFormSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            showLoader(true);
            showStatus('جاري حفظ البيانات...', 'info');

            const payload = {
                date: document.getElementById('date').value,
                supplier: document.getElementById('supplier').value,
                amount: document.getElementById('amount').value,
                payment: document.getElementById('payment').value,
                taxNumber: document.getElementById('taxNumber').value,
                hasVat: document.getElementById('hasVat').value,
                notes: document.getElementById('notes').value,
                employee: Session.getActiveUser ? Session.getActiveUser().getEmail() : 'user@example.com' // للحصول على البريد الإلكتروني إذا كان يعمل من داخل Apps Script
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'saveData', payload: payload })
                });

                const result = await response.json();

                if (result.success) {
                    showStatus(result.message, 'success');
                    document.getElementById('expenseForm').reset();
                    document.getElementById('date').valueAsDate = new Date();
                    document.getElementById('imagePreviewContainer').style.display = 'none';
                    document.getElementById('highlightBox').style.display = 'none';
                } else {
                    throw new Error(result.error || 'فشل الحفظ.');
                }
            } catch (error) {
                showStatus('خطأ: ' + error.message, 'error');
            } finally {
                showLoader(false);
                submitBtn.disabled = false;
            }
        }

        // دوال مساعدة للواجهة
        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + type;
            statusEl.style.display = 'block';
        }
    </script>
</body>
</html>
